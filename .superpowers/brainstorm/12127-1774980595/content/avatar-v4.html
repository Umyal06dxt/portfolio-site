<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Avatar v4</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background:#050505; color:white; font-family:'Courier New',monospace;
    display:flex; flex-direction:column; align-items:center;
    justify-content:center; min-height:100vh; padding:48px 24px; gap:40px;
  }
  .title { font-size:9px; letter-spacing:5px; text-transform:uppercase; color:#E85002; }
  .row { display:flex; gap:56px; align-items:center; justify-content:center; flex-wrap:wrap; }
  .card {
    display:flex; flex-direction:column; align-items:center; gap:16px;
    background:#080808; border:1px solid rgba(255,255,255,0.07);
    padding:36px 32px; border-radius:2px;
  }
  .lbl { font-size:7px; letter-spacing:3px; text-transform:uppercase; color:rgba(255,255,255,0.3); }
  .lbl b { color:#E85002; font-weight:normal; }
</style>
</head>
<body>

<div class="title">// Avatar v4 — Clean Illustration</div>

<div class="row">

  <!-- ═══ MAIN HERO AVATAR ═══ -->
  <div class="card">
    <div class="lbl"><b>Hero Size</b> · curly hair · rectangular glasses</div>

    <svg viewBox="0 0 220 280" width="220" height="280"
         xmlns="http://www.w3.org/2000/svg"
         style="filter:drop-shadow(0 0 30px rgba(232,80,2,0.28))">
      <defs>
        <!-- Skin gradient for depth -->
        <radialGradient id="faceGrad" cx="45%" cy="38%" r="60%">
          <stop offset="0%"   stop-color="#eea878"/>
          <stop offset="55%"  stop-color="#d4885a"/>
          <stop offset="100%" stop-color="#b86840"/>
        </radialGradient>
        <!-- Hair shine -->
        <radialGradient id="hairGrad" cx="50%" cy="20%" r="70%">
          <stop offset="0%"   stop-color="#2e1c0c"/>
          <stop offset="100%" stop-color="#100a04"/>
        </radialGradient>
        <!-- Eye orange glow -->
        <radialGradient id="eyeGlow" cx="50%" cy="50%" r="50%">
          <stop offset="0%"   stop-color="#ff8040"/>
          <stop offset="60%"  stop-color="#E85002"/>
          <stop offset="100%" stop-color="#a03000"/>
        </radialGradient>
        <!-- Orange rim light for hair -->
        <linearGradient id="rimLight" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%"   stop-color="#E85002" stop-opacity="0.5"/>
          <stop offset="100%" stop-color="#E85002" stop-opacity="0"/>
        </linearGradient>
        <clipPath id="faceClip">
          <ellipse cx="110" cy="138" rx="56" ry="60"/>
        </clipPath>
      </defs>

      <!-- ─── BODY / SHOULDERS ─── -->

      <path d="M82,228 L110,220 L138,228 L130,238 L110,232 L90,238 Z" fill="#2e2040"/>
      <!-- Neck -->
      <rect x="97" y="208" width="26" height="20" rx="3" fill="url(#faceGrad)"/>

      <!-- ─── HAIR — back layer (behind face) ─── -->
      <!--
        Key: one clean outer silhouette = the whole hair shape.
        Curly = wavy bottom edge + side puffs.
      -->

      <!-- Main hair mass -->

        C24,154 32,170 40,180

        C196,154 188,170 180,180
        C178,168 178,154 176,140
        C174,124 172,106 168,94 Z

      <path d="
        M36,148
        C28,156 26,168 28,182
        C30,192 36,200 44,206
        C42,194 40,182 40,170

        C188,172 190,168 190,162 Z

      <path d="M166,118 C168,130 166,148 162,162 C160,148 160,130 162,116 Z" fill="#b86840" opacity="0.35"/>

      <path d="

        C174,96 176,106 176,116
        C174,108 172,100 168,92 Z

      <path d="M106,156 C108,158 112,158 114,156" stroke="#b06038" stroke-width="1.5" fill="none" stroke-linecap="round"/>

      <!-- ─── RECTANGULAR WAFER GLASSES ─── -->
      <!--
        Thin rectangular frames — trendy wafer style.
        Gold/brass colored, very thin stroke.
      -->
      <!-- Left lens rectangle -->
      <rect x="66" y="118" width="44" height="24" rx="4" ry="4"

      <!-- Right lens rectangle -->
      <rect x="110" y="118" width="44" height="24" rx="4" ry="4"
            fill="rgba(210,230,255,0.04)" stroke="#c8a878" stroke-width="2"/>
      <!-- Bridge -->
      <line x1="110" y1="130" x2="110" y2="130" stroke="#c8a878" stroke-width="0"/>
      <path d="M110,126 Q110,122 110,126" stroke="#c8a878" stroke-width="1.5" fill="none"/>
      <!-- Nose pads (subtle) -->
      <circle cx="68"  cy="132" r="1.5" fill="#c8a878" opacity="0.6"/>
      <circle cx="152" cy="132" r="1.5" fill="#c8a878" opacity="0.6"/>
      <!-- Temple arms -->
      <path d="M66,128 C58,128 52,126 46,122" stroke="#c8a878" stroke-width="2" fill="none" stroke-linecap="round"/>
      <path d="M154,128 C162,128 168,126 174,122" stroke="#c8a878" stroke-width="2" fill="none" stroke-linecap="round"/>
      <!-- Lens reflections (thin diagonal lines) -->
      <line x1="70" y1="120" x2="76" y2="126" stroke="white" stroke-width="1" opacity="0.18"/>
      <line x1="114" y1="120" x2="120" y2="126" stroke="white" stroke-width="1" opacity="0.18"/>

      <!-- ─── MOUTH — warm smile ─── -->
      <!-- Smile curve -->
      <path d="M88,172 Q110,186 132,172" stroke="#8a3820" stroke-width="2" fill="none" stroke-linecap="round"/>
      <!-- Upper lip -->
      <path d="
        M90,170
        C96,166 104,164 110,166
        C116,164 124,166 130,170
        C124,174 116,176 110,176
        C104,176 96,174 90,170 Z

      <path d="
        M90,170
        C94,178 102,182 110,183
        C118,182 126,178 130,170
        C124,176 116,178 110,178
        C104,178 96,176 90,170 Z

      <path d="M93,171 Q110,178 127,171 Q120,177 110,178 Q100,177 93,171 Z" fill="white" opacity="0.92"/>
      <!-- Philtrum -->
      <path d="M106,162 Q110,158 114,162" stroke="#c07850" stroke-width="1.2" fill="none" opacity="0.4"/>

      <circle cx="88"  cy="172" r="2" fill="#b86040" opacity="0.4"/>
      <circle cx="132" cy="172" r="2" fill="#b86040" opacity="0.4"/>

      <!-- ─── ORANGE ACCENT / BRAND ─── -->
      <!-- Subtle rim light on hair left side -->
      <path d="M42,86 C28,100 22,122 24,148" stroke="#E85002" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.3"/>
      <!-- Rim light right -->
      <path d="M178,86 C192,100 198,122 196,148" stroke="#E85002" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.2"/>
      <!-- Top hair orange rim -->
      <path d="M68,18 C84,10 96,8 110,8 C124,8 138,10 152,18" stroke="#E85002" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.35"/>

      <!-- Outer ambient ring -->
      <ellipse cx="110" cy="140" rx="96" ry="108" fill="none" stroke="#E85002" stroke-width="0.6" opacity="0.1"/>

    </svg>

    <div class="lbl">Rectangular wafer glasses · curly dark hair · <b>orange irises</b></div>
  </div>

      <svg viewBox="0 0 220 280" width="186" height="236"

           style="position:relative;z-index:2;filter:drop-shadow(0 0 22px rgba(232,80,2,0.42));margin-bottom:28px">
        <defs>
